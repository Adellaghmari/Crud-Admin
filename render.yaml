services:
  - type: web
    name: client-admin-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: client-admin-db
          property: connectionString

databases:
  - name: client-admin-db
    plan: free
